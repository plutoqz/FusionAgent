version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    environment:
      GEOFUSION_KG_BACKEND: ${GEOFUSION_KG_BACKEND:-neo4j}
      GEOFUSION_NEO4J_URI: bolt://neo4j:7687
      GEOFUSION_NEO4J_USER: ${GEOFUSION_NEO4J_USER:-neo4j}
      GEOFUSION_NEO4J_PASSWORD: ${GEOFUSION_NEO4J_PASSWORD:-geofusion123}
      GEOFUSION_NEO4J_DATABASE: ${GEOFUSION_NEO4J_DATABASE:-neo4j}
      GEOFUSION_CELERY_BROKER: redis://redis:6379/0
      GEOFUSION_CELERY_BACKEND: redis://redis:6379/0
      GEOFUSION_CELERY_EAGER: "0"
      GEOFUSION_LLM_PROVIDER: ${GEOFUSION_LLM_PROVIDER:-mock}
      GEOFUSION_LLM_BASE_URL: ${GEOFUSION_LLM_BASE_URL:-http://fast.jnm.lol/v1}
      GEOFUSION_LLM_MODEL: ${GEOFUSION_LLM_MODEL:-gpt-5.4-mini}
      GEOFUSION_LLM_API_KEY: ${GEOFUSION_LLM_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - neo4j
    volumes:
      - ./:/app

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A worker.celery_app.celery_app worker -l info
    environment:
      GEOFUSION_KG_BACKEND: ${GEOFUSION_KG_BACKEND:-neo4j}
      GEOFUSION_NEO4J_URI: bolt://neo4j:7687
      GEOFUSION_NEO4J_USER: ${GEOFUSION_NEO4J_USER:-neo4j}
      GEOFUSION_NEO4J_PASSWORD: ${GEOFUSION_NEO4J_PASSWORD:-geofusion123}
      GEOFUSION_NEO4J_DATABASE: ${GEOFUSION_NEO4J_DATABASE:-neo4j}
      GEOFUSION_CELERY_BROKER: redis://redis:6379/0
      GEOFUSION_CELERY_BACKEND: redis://redis:6379/0
      GEOFUSION_CELERY_EAGER: "0"
      GEOFUSION_LLM_PROVIDER: ${GEOFUSION_LLM_PROVIDER:-mock}
      GEOFUSION_LLM_BASE_URL: ${GEOFUSION_LLM_BASE_URL:-http://fast.jnm.lol/v1}
      GEOFUSION_LLM_MODEL: ${GEOFUSION_LLM_MODEL:-gpt-5.4-mini}
      GEOFUSION_LLM_API_KEY: ${GEOFUSION_LLM_API_KEY:-}
      GEOFUSION_SCHEDULED_RUNS: ${GEOFUSION_SCHEDULED_RUNS:-[]}
    depends_on:
      - redis
      - neo4j
    volumes:
      - ./:/app

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A worker.celery_app.celery_app beat -l info
    environment:
      GEOFUSION_CELERY_BROKER: redis://redis:6379/0
      GEOFUSION_CELERY_BACKEND: redis://redis:6379/0
      GEOFUSION_CELERY_EAGER: "0"
      GEOFUSION_SCHEDULED_INTERVAL_SECONDS: ${GEOFUSION_SCHEDULED_INTERVAL_SECONDS:-3600}
      GEOFUSION_SCHEDULED_RUNS: ${GEOFUSION_SCHEDULED_RUNS:-[]}
    depends_on:
      - redis
      - worker
    volumes:
      - ./:/app

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5.20
    environment:
      NEO4J_AUTH: neo4j/${GEOFUSION_NEO4J_PASSWORD:-geofusion123}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

volumes:
  neo4j-data:
